const getCategory = (name, categories) => {
  const list = (categories && categories.length > 0) ? categories : DEFAULT_CATEGORIES;
  return list.find(c => c.name === name) || list[0];
};

// 旧データ／壊れたJSON読込時の欠損フィールドを補う
const normalizeRecipe = (r) => ({
  id: r.id || Date.now().toString(),
  title: r.title || '（無題）',
  url: r.url || '',
  memo: r.memo || '',
  category: r.category || (DEFAULT_CATEGORIES[0] && DEFAULT_CATEGORIES[0].name) || '',
  tags: Array.isArray(r.tags) ? r.tags : [],
  emoji: r.emoji || '🍳',
  imageData: r.imageData || null,
  createdAt: r.createdAt || new Date().toISOString().split('T')[0],
  lastViewedAt: r.lastViewedAt || r.createdAt || new Date().toISOString().split('T')[0],
  cookedLogs: Array.isArray(r.cookedLogs) ? r.cookedLogs : []
});

const normalizeRecipes = (arr) => Array.isArray(arr) ? arr.map(normalizeRecipe) : [];

const normalizeCategory = (c) => ({
  name: (c && c.name) || 'その他',
  color: (c && c.color) || '#FCE0E6',
  deep: (c && c.deep) || '#E8869B',
  emoji: (c && c.emoji) || '🍽️'
});

const normalizeCategories = (arr) => {
  if (!Array.isArray(arr) || arr.length === 0) return DEFAULT_CATEGORIES;
  return arr.map(normalizeCategory);
};

// javascript: など危険なスキームを弾く
const safeUrl = (url) => {
  if (!url || typeof url !== 'string') return '';
  const trimmed = url.trim();
  if (!trimmed) return '';
  // http/https/mailto/tel のみ許可、それ以外（javascript:等）は無効
  if (/^(https?:\/\/|mailto:|tel:)/i.test(trimmed)) return trimmed;
  // プロトコルなしなら https を補完
  if (/^[\w-]+(\.[\w-]+)+/.test(trimmed)) return 'https://' + trimmed;
  return '';
};

// Instagram URLをApp Storeに飛ばさない形（embed）に変換する
// iOS Safariで instagram.com を開くとApp Storeに飛ばされる問題の回避
const toOpenableUrl = (url) => {
  const safe = safeUrl(url);
  if (!safe) return '';
  // Instagram投稿/リール/TV → /embed/captioned/ に変換
  // 例: https://www.instagram.com/p/ABC123/?igsh=xxx → https://www.instagram.com/p/ABC123/embed/captioned/
  const m = safe.match(/^(https?:\/\/(?:www\.)?instagram\.com\/(?:p|reel|reels|tv)\/[A-Za-z0-9_-]+)/i);
  if (m) return m[1] + '/embed/captioned/';
  return safe;
};

// 画像圧縮：目標サイズに収まるまで段階的に画質と解像度を下げる
// 写真の見栄えを保ちつつ、localStorage圧迫を防ぐ
const IMAGE_TARGET_KB = 100; // 1枚あたりの目標サイズ
const IMAGE_PRESETS = [
  { max: 720, q: 0.72 },  // まずこれで試す（標準的にきれい）
  { max: 640, q: 0.65 },
  { max: 560, q: 0.6 },
  { max: 480, q: 0.55 },
  { max: 420, q: 0.5 },
  { max: 360, q: 0.45 }   // 最終フォールバック（かなり荒くなる）
];

const renderToDataUrl = (img, max, quality) => {
  let { width, height } = img;
  if (width > max || height > max) {
    if (width > height) { height = Math.round(height * max / width); width = max; }
    else { width = Math.round(width * max / height); height = max; }
  }
  const canvas = document.createElement('canvas');
  canvas.width = width; canvas.height = height;
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#FFFFFF'; // PNG透過対策
  ctx.fillRect(0, 0, width, height);
  ctx.drawImage(img, 0, 0, width, height);
  return canvas.toDataURL('image/jpeg', quality);
};

const compressImage = (img) => {
  const targetBytes = IMAGE_TARGET_KB * 1024;
  let lastResult = null;
  for (const { max, q } of IMAGE_PRESETS) {
    const dataUrl = renderToDataUrl(img, max, q);
    // base64文字数 × 0.75 ≒ 実バイト数
    const approxBytes = dataUrl.length * 0.75;
    lastResult = dataUrl;
    if (approxBytes <= targetBytes) return dataUrl;
  }
  return lastResult; // 最も小さい設定の結果を返す
};

// クリップボードにコピー（iOS Safari対応）
const copyToClipboard = async (text) => {
  try {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      await navigator.clipboard.writeText(text);
    } else {
      const ta = document.createElement('textarea');
      ta.value = text; ta.style.position = 'fixed'; ta.style.opacity = '0';
      document.body.appendChild(ta); ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
    }
    return true;
  } catch (e) { return false; }
};
const formatMonth = (dateStr) => { const d = new Date(dateStr); return `${d.getFullYear()}年${d.getMonth() + 1}月`; };
const monthKey = (dateStr) => { const d = new Date(dateStr); return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`; };
const formatDate = (dateStr) => { const d = new Date(dateStr); return `${d.getMonth() + 1}/${d.getDate()}`; };

// ========== App ==========
function RecipeStockApp() {
  const [recipes, setRecipes] = useState([]);
  const [categories, setCategories] = useState(DEFAULT_CATEGORIES);
  const [loading, setLoading] = useState(true);
  const [view, setView] = useState('home');
  const [selectedId, setSelectedId] = useState(null);
  const [editingId, setEditingId] = useState(null);
  const [versionPopup, setVersionPopup] = useState(null); // 表示するバージョン情報

  useEffect(() => {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) setRecipes(normalizeRecipes(JSON.parse(saved)));
      else localStorage.setItem(STORAGE_KEY, JSON.stringify(SAMPLE_RECIPES));

      const savedCats = localStorage.getItem(CATEGORIES_KEY);
      if (savedCats) setCategories(normalizeCategories(JSON.parse(savedCats)));
      else localStorage.setItem(CATEGORIES_KEY, JSON.stringify(DEFAULT_CATEGORIES));

      // バージョン確認：初回は無音で保存、更新後の起動ではポップアップ
      const seenVersion = localStorage.getItem(VERSION_KEY);
      const hasData = !!saved; // 既存ユーザー判定
      if (seenVersion === null) {
        // 初回起動 → 既存データがあるなら「どこかのバージョンから飛んできた」と見なしてポップ表示
        if (hasData) {
          const entry = CHANGELOG.find(c => c.version === APP_VERSION);
          if (entry) setVersionPopup(entry);
        }
        localStorage.setItem(VERSION_KEY, APP_VERSION);
      } else if (seenVersion !== APP_VERSION) {
        const entry = CHANGELOG.find(c => c.version === APP_VERSION);
        if (entry) setVersionPopup(entry);
      }
    } catch (e) {
      console.error('データ読み込みエラー:', e);
      setRecipes(SAMPLE_RECIPES);
      setCategories(DEFAULT_CATEGORIES);
    }
    setLoading(false);
  }, []);

  const dismissVersionPopup = () => {
    localStorage.setItem(VERSION_KEY, APP_VERSION);
    setVersionPopup(null);
  };

  const openVersionPopup = () => {
    const entry = CHANGELOG.find(c => c.version === APP_VERSION) || CHANGELOG[0];
    if (entry) setVersionPopup(entry);
  };

  const saveRecipes = (newRecipes) => {
    setRecipes(newRecipes);
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(newRecipes));
    } catch (e) {
      alert('保存できませんでした。容量が足りない可能性があります（写真サイズを小さくしてください）');
      console.error(e);
    }
  };

  const saveCategories = (newCategories) => {
    setCategories(newCategories);
    try {
      localStorage.setItem(CATEGORIES_KEY, JSON.stringify(newCategories));
    } catch (e) { console.error(e); }
  };

  const addRecipe = (data) => {
    const cat = getCategory(data.category, categories);
    const newRecipe = {
      id: Date.now().toString(),
      ...data,
      createdAt: new Date().toISOString().split('T')[0],
      lastViewedAt: new Date().toISOString().split('T')[0],
      cookedLogs: [],
      emoji: data.emoji || cat.emoji
    };
    saveRecipes([newRecipe, ...recipes]);
    setView('list');
  };

  const updateRecipe = (id, data) => {
    saveRecipes(recipes.map(r => r.id === id ? { ...r, ...data } : r));
    setView('detail');
  };

  const deleteRecipe = (id) => {
    saveRecipes(recipes.filter(r => r.id !== id));
    setView('list');
  };

  const markAsCooked = (id, memo = '') => {
    const today = new Date().toISOString().split('T')[0];
    saveRecipes(recipes.map(r => r.id === id ? {
      ...r, cookedLogs: [...r.cookedLogs, { date: today, memo }]
    } : r));
  };

  const updateLastViewed = (id) => {
    const today = new Date().toISOString().split('T')[0];
    saveRecipes(recipes.map(r => r.id === id ? { ...r, lastViewedAt: today } : r));
  };

  const resetData = () => {
    if (confirm('サンプルデータに戻します。今のデータは消えます。よろしいですか？')) {
      saveRecipes(SAMPLE_RECIPES);
      setView('home');
    }
  };

  const clearAll = () => {
    if (confirm('すべてのレシピを削除します。本当によろしいですか？')) {
      saveRecipes([]);
      setView('home');
    }
  };

  // カテゴリー操作
  const addCategory = (cat) => {
    if (categories.some(c => c.name === cat.name)) {
      alert('同じ名前のカテゴリーがあります');
      return false;
    }
    saveCategories([...categories, cat]);
    return true;
  };

  const updateCategory = (oldName, cat) => {
    if (oldName !== cat.name && categories.some(c => c.name === cat.name)) {
      alert('同じ名前のカテゴリーがあります');
      return false;
    }
    saveCategories(categories.map(c => c.name === oldName ? cat : c));
    // レシピのカテゴリー名も更新
    if (oldName !== cat.name) {
      saveRecipes(recipes.map(r => r.category === oldName ? { ...r, category: cat.name } : r));
    }
    return true;
  };

  const deleteCategory = (name) => {
    if (categories.length <= 1) {
      alert('カテゴリーは1つ以上必要です');
      return;
    }
    const used = recipes.filter(r => r.category === name).length;
    const fallback = categories.find(c => c.name !== name).name;
    const msg = used > 0
      ? `「${name}」を削除します。このカテゴリーのレシピ ${used} 件は「${fallback}」に移動します。よろしいですか？`
      : `「${name}」を削除します。よろしいですか？`;
    if (!confirm(msg)) return;
    saveCategories(categories.filter(c => c.name !== name));
    if (used > 0) {
      saveRecipes(recipes.map(r => r.category === name ? { ...r, category: fallback } : r));
    }
  };

  const selected = recipes.find(r => r.id === selectedId);
  const editing = recipes.find(r => r.id === editingId);

  const handleSelect = (id) => {
    setSelectedId(id);
    updateLastViewed(id);
    setView('detail');
  };

  if (loading) {
    return (
      <div style={{ background: COLORS.bg, minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center', color: COLORS.textLight }}>
        <div>読み込み中...</div>
      </div>
    );
  }

  return (
    <div style={{
      background: COLORS.bg, minHeight: '100vh', color: COLORS.text,
      paddingBottom: '80px', maxWidth: '480px', margin: '0 auto', position: 'relative'
    }}>
      {view === 'home' && <HomeView recipes={recipes} categories={categories} onSelect={handleSelect} onGoList={() => setView('list')} />}
      {view === 'list' && <ListView recipes={recipes} categories={categories} onSelect={handleSelect} />}
      {view === 'add' && <AddEditView categories={categories} onSave={addRecipe} onCancel={() => setView('home')} title="新しく保存" />}
      {view === 'detail' && selected && <DetailView recipe={selected} categories={categories} onBack={() => setView('list')} onEdit={() => { setEditingId(selectedId); setView('edit'); }} onDelete={() => deleteRecipe(selected.id)} onCook={(memo) => markAsCooked(selected.id, memo)} />}
      {view === 'edit' && editing && <AddEditView initial={editing} categories={categories} onSave={(data) => updateRecipe(editing.id, data)} onCancel={() => setView('detail')} title="編集する" />}
      {view === 'settings' && <SettingsView recipes={recipes} categories={categories} onAddCategory={addCategory} onUpdateCategory={updateCategory} onDeleteCategory={deleteCategory} onClear={clearAll} onShowChangelog={openVersionPopup} />}

      {view !== 'add' && view !== 'edit' && <BottomNav view={view} setView={setView} />}

      {versionPopup && <VersionPopup entry={versionPopup} onClose={dismissVersionPopup} />}
    </div>
  );
}

// ========== Home ==========
function HomeView({ recipes, categories, onSelect, onGoList }) {

    return [...recipes].sort((a, b) => new Date(b.lastViewedAt) - new Date(a.lastViewedAt)).slice(0, 5);
  }, [recipes]);

  const reminder = useMemo(() => {
    const oldOnes = recipes.filter(r => {
      const daysSince = (Date.now() - new Date(r.createdAt)) / (1000 * 60 * 60 * 24);
      return daysSince > 30 && r.cookedLogs.length === 0;
    });
    if (oldOnes.length === 0) return null;
    return oldOnes[Math.floor(Math.random() * oldOnes.length)];
  }, [recipes]);

  const categoryCounts = categories.map(c => ({
    ...c, count: recipes.filter(r => r.category === c.name).length
  }));

  return (
    <div style={{ padding: '20px 16px' }}>
      <div style={{ marginBottom: '24px', paddingTop: '8px' }}>

          さきちゃんのレシピ帳
        </div>
        <div style={{ fontSize: '12px', color: COLORS.textLight, marginTop: '4px' }}>いいな、を忘れないで</div>
      </div>

        <div onClick={() => onSelect(reminder.id)} style={{
          background: COLORS.accentSoft,
          border: `1px solid ${COLORS.border}`,
          borderRadius: '16px', padding: '14px', marginBottom: '20px',
          cursor: 'pointer'
        }}>
          <div style={{ display: 'flex', alignItems: 'center', gap: '6px', marginBottom: '10px' }}>
            <Sparkles size={14} color={COLORS.accent} />
            <div style={{ fontSize: '12px', fontWeight: 700, color: COLORS.accent }}>こんなの保存してたよ</div>
          </div>
          <div style={{ background: COLORS.card, borderRadius: '12px', padding: '10px', display: 'flex', alignItems: 'center', gap: '10px' }}>
            <RecipeThumb recipe={reminder} categories={categories} size={44} fontSize={24} radius={10} />
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: '14px', fontWeight: 600 }}>{reminder.title}</div>
              <div style={{ fontSize: '11px', color: COLORS.textLight, marginTop: '2px' }}>{formatMonth(reminder.createdAt)}に保存</div>
            </div>
          </div>

      <Section title="最近見たレシピ" icon={<Clock size={16} />} action={recipes.length > 5 ? <span onClick={onGoList} style={{ fontSize: '12px', color: COLORS.accent, fontWeight: 600, cursor: 'pointer' }}>すべて見る →</span> : null}>
        <div style={{ display: 'flex', gap: '12px', overflowX: 'auto', paddingBottom: '4px', marginLeft: '-16px', marginRight: '-16px', paddingLeft: '16px', paddingRight: '16px' }}>
          {recent.map(r => (
            <RecipeMiniCard key={r.id} recipe={r} categories={categories} onClick={() => onSelect(r.id)} />

          {categoryCounts.map(c => (
            <div key={c.name} onClick={onGoList} style={{
              background: c.color,
              borderRadius: '14px', padding: '14px',
              cursor: 'pointer', display: 'flex', alignItems: 'center', gap: '10px'

// ========== List ==========
function ListView({ recipes, categories, onSelect }) {
  const [selectedMonth, setSelectedMonth] = useState('all');
  const [selectedCategory, setSelectedCategory] = useState('all');
  const [search, setSearch] = useState('');

  const months = useMemo(() => {
    const set = new Set(recipes.map(r => monthKey(r.createdAt)));
    return Array.from(set).sort().reverse();
  }, [recipes]);

  const filtered = useMemo(() => {
    return recipes.filter(r => {
      if (selectedMonth !== 'all' && monthKey(r.createdAt) !== selectedMonth) return false;
      if (selectedCategory !== 'all' && r.category !== selectedCategory) return false;
      if (search && !r.title.includes(search) && !(r.memo || '').includes(search) && !r.tags.some(t => t.includes(search))) return false;
      return true;
    }).sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
  }, [recipes, selectedMonth, selectedCategory, search]);

  return (
    <div style={{ padding: '20px 16px' }}>
      <div style={{ fontSize: '22px', fontWeight: 800, marginBottom: '16px', paddingTop: '8px' }}>
        レシピ一覧
      </div>

      <div style={{ position: 'relative', marginBottom: '14px' }}>
        <Search size={16} style={{ position: 'absolute', left: '14px', top: '50%', transform: 'translateY(-50%)', color: COLORS.textLight }} />
        <input
          type="text" placeholder="タイトル・メモ・タグで検索"
          value={search} onChange={e => setSearch(e.target.value)}
          style={{
            width: '100%', padding: '12px 14px 12px 40px',
            border: `1.5px solid ${COLORS.border}`, borderRadius: '14px',
            fontSize: '13px', background: COLORS.card, outline: 'none', boxSizing: 'border-box'
          }}
        />
      </div>

      <div style={{ display: 'flex', gap: '6px', overflowX: 'auto', marginBottom: '12px', paddingBottom: '4px', marginLeft: '-16px', marginRight: '-16px', paddingLeft: '16px', paddingRight: '16px' }}>
        <Chip active={selectedMonth === 'all'} onClick={() => setSelectedMonth('all')}>すべての月</Chip>
        {months.map(m => (
          <Chip key={m} active={selectedMonth === m} onClick={() => setSelectedMonth(m)}>
            {m.split('-')[0].slice(2)}年{parseInt(m.split('-')[1])}月
          </Chip>
        ))}
      </div>

      <div style={{ display: 'flex', gap: '6px', overflowX: 'auto', marginBottom: '16px', paddingBottom: '4px', marginLeft: '-16px', marginRight: '-16px', paddingLeft: '16px', paddingRight: '16px' }}>
        <Chip active={selectedCategory === 'all'} onClick={() => setSelectedCategory('all')}>全部</Chip>
        {categories.map(c => (
          <Chip key={c.name} active={selectedCategory === c.name} onClick={() => setSelectedCategory(c.name)} color={c.color} borderColor={c.deep}>
            {c.emoji} {c.name}
          </Chip>
        ))}
      </div>

      {filtered.length === 0 ? (
        <div style={{ textAlign: 'center', padding: '40px 20px', color: COLORS.textLight, fontSize: '13px' }}>
          {recipes.length === 0 ? '右下の＋ボタンから保存してみよう！' : '該当するレシピがないよ'}
        </div>
      ) : (
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '12px' }}>
          {filtered.map(r => <RecipeCard key={r.id} recipe={r} categories={categories} onClick={() => onSelect(r.id)} />)}
        </div>
      )}
    </div>
  );
}

function Chip({ children, active, onClick, color, borderColor }) {
  // colorあり=カテゴリーチップ：activeで該当パステル色
  // colorなし=月／全部チップ：activeでダークグレー
  const activeBg = color || COLORS.text;
  const activeBorder = borderColor || color || COLORS.text;
  const activeText = color ? COLORS.text : '#FFFFFF';
  return (
    <div onClick={onClick} style={{
      padding: '7px 13px', borderRadius: '20px',
      background: active ? activeBg : COLORS.card,
      border: `1px solid ${active ? activeBorder : COLORS.border}`,
      fontSize: '12px', fontWeight: active ? 700 : 500,
      cursor: 'pointer', whiteSpace: 'nowrap',
      color: active ? activeText : COLORS.text, flexShrink: 0
    }}>{children}</div>
  );
}

function RecipeCard({ recipe, categories, onClick }) {
  const cat = getCategory(recipe.category, categories);
  const thumbStyle = recipe.imageData ? {
    backgroundImage: `url(${recipe.imageData})`,
    backgroundSize: 'cover', backgroundPosition: 'center'

  return (
    <div onClick={onClick} style={{
      background: COLORS.card,
      border: `1px solid ${COLORS.border}`,
      borderRadius: '14px',
      overflow: 'hidden', cursor: 'pointer'
    }}>
      <div style={{
        aspectRatio: '1', display: 'flex', alignItems: 'center', justifyContent: 'center',
        fontSize: '56px', position: 'relative', ...thumbStyle
      }}>
        {!recipe.imageData && recipe.emoji}
        {recipe.cookedLogs.length > 0 && (
          <div style={{
            position: 'absolute', top: '8px', right: '8px', background: 'white',
            borderRadius: '20px', padding: '3px 8px', fontSize: '10px',
            fontWeight: 700, display: 'flex', alignItems: 'center', gap: '3px',
            color: COLORS.accent
          }}>
            <ChefHat size={10} color={COLORS.accent} />
            <span>{recipe.cookedLogs.length}</span>
          </div>
        )}
        <div style={{
          position: 'absolute', bottom: '6px', left: '6px',
          background: cat.color,
          borderRadius: '8px', padding: '3px 8px', fontSize: '10px', fontWeight: 700,
          color: COLORS.text
        }}>{cat.emoji} {cat.name}</div>
      </div>
      <div style={{ padding: '10px 12px' }}>
        <div style={{ fontSize: '13px', fontWeight: 700, lineHeight: 1.3, marginBottom: '4px' }}>
          {recipe.title}
        </div>
        <div style={{ fontSize: '10px', color: COLORS.textLight }}>

// ========== Add / Edit ==========
function AddEditView({ initial, categories, onSave, onCancel, title }) {
  const [formTitle, setFormTitle] = useState(initial?.title || '');
  const [url, setUrl] = useState(initial?.url || '');
  const [memo, setMemo] = useState(initial?.memo || '');
  const [category, setCategory] = useState(initial?.category || (categories[0] && categories[0].name) || 'おかず');
  const [tags, setTags] = useState(initial?.tags || []);
  const [tagInput, setTagInput] = useState('');
  const [emoji, setEmoji] = useState(initial?.emoji || '🍳');
  const [imageData, setImageData] = useState(initial?.imageData || null);

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    if (!file.type.startsWith('image/')) {
      alert('画像ファイルを選んでね');
      e.target.value = '';
      return;
    }
    const reader = new FileReader();
    reader.onload = (ev) => {
      const img = new Image();
      img.onload = () => {
        try {
          const dataUrl = compressImage(img);
          setImageData(dataUrl);
        } catch (err) {
          console.error(err);
          alert('画像の処理に失敗しました');
        }
      };
      img.onerror = () => alert('画像が読み込めませんでした');
      img.src = ev.target.result;
    };
    reader.onerror = () => alert('ファイルが開けませんでした');
    reader.readAsDataURL(file);
    // 同じファイルを再度選べるようにクリア
    e.target.value = '';
  };

  const addTag = () => {
    const t = tagInput.trim();
    if (t && !tags.includes(t)) { setTags([...tags, t]); setTagInput(''); }
  };
  const removeTag = (t) => setTags(tags.filter(x => x !== t));

  const handleSave = () => {
    if (!formTitle.trim()) { alert('タイトルを入れてね'); return; }
    onSave({
      title: formTitle.trim(), url: url.trim(), memo: memo.trim(),
      category, tags, emoji, imageData
    });
  };

  return (
    <div style={{ padding: '20px 16px' }}>
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: '20px' }}>
        <div onClick={onCancel} style={{ cursor: 'pointer', padding: '8px' }}><X size={22} /></div>
        <div style={{ fontSize: '16px', fontWeight: 700 }}>{title}</div>
        <div onClick={handleSave} style={{
          cursor: 'pointer', padding: '8px 16px', background: COLORS.accent,
          color: 'white', borderRadius: '20px', fontSize: '13px', fontWeight: 700,
          display: 'flex', alignItems: 'center', gap: '4px'
        }}>
          <Check size={14} color="white" /> 保存
        </div>
      </div>

      <div style={{ background: COLORS.card, borderRadius: '20px', padding: '16px', marginBottom: '16px' }}>
        <Label>写真（任意）</Label>
        {imageData ? (
          <div style={{ position: 'relative', borderRadius: '14px', overflow: 'hidden', marginBottom: '8px' }}>
            <img src={imageData} alt="" style={{ width: '100%', height: '180px', objectFit: 'cover', display: 'block' }} />
            <div onClick={() => setImageData(null)} style={{
              position: 'absolute', top: '8px', right: '8px', background: 'white',
              borderRadius: '50%', width: '28px', height: '28px', display: 'flex',
              alignItems: 'center', justifyContent: 'center', cursor: 'pointer'
            }}><X size={14} /></div>
          </div>
        ) : (
          <label style={{
            display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '8px',
            height: '100px', background: COLORS.bg, borderRadius: '14px', cursor: 'pointer',
            border: `2px dashed ${COLORS.border}`, color: COLORS.textLight, fontSize: '13px'
          }}>
            <ImageIcon size={18} />
            <span>写真を追加</span>
            <input type="file" accept="image/*" onChange={handleImageUpload} style={{ display: 'none' }} />
          </label>
        )}

        {!imageData && (
          <>
            <Label style={{ marginTop: '12px' }}>アイコン</Label>
            <div style={{ display: 'flex', alignItems: 'center', gap: '10px' }}>
              <div style={{
                width: '52px', height: '52px', borderRadius: '12px',
                background: getCategory(category, categories).color,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                fontSize: '28px', flexShrink: 0
              }}>{emoji || '?'}</div>
              <input
                type="text" value={emoji}
                onChange={e => setEmoji(e.target.value)}
                placeholder="絵文字を入力"
                style={{
                  flex: 1, padding: '12px 14px', border: `1.5px solid ${COLORS.border}`,

              スマホはキーボードの絵文字ボタンから、PCは <kbd style={{ background: COLORS.surface, padding: '1px 6px', borderRadius: '4px', fontSize: '10px' }}>Win + .</kbd> または <kbd style={{ background: COLORS.surface, padding: '1px 6px', borderRadius: '4px', fontSize: '10px' }}>Ctrl + Cmd + Space</kbd>

        <Input value={url} onChange={setUrl} placeholder="https://..." />

        <div style={{ display: 'flex', gap: '8px' }}>

            style={{

          />
          <div onClick={addTag} style={{

                display: 'flex', alignItems: 'center', gap: '4px'
              }}>

// ========== URL Link (Instagram対策付き) ==========
function UrlLink({ url }) {
  const [copied, setCopied] = useState(false);
  const original = safeUrl(url);
  const openable = toOpenableUrl(url);
  const isInstagram = /^https?:\/\/(?:www\.)?instagram\.com\//i.test(original);

  const handleCopy = async (e) => {
    e.preventDefault();
    e.stopPropagation();
    const ok = await copyToClipboard(original);
    if (ok) {
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    } else {
      alert('コピーできませんでした');
    }
  };

  return (
    <div style={{ marginBottom: '16px' }}>
      <a href={openable} target="_blank" rel="noopener noreferrer" style={{
        display: 'flex', alignItems: 'center', gap: '8px',
        padding: '12px 14px', background: COLORS.card,
        borderRadius: '12px',
        border: `1px solid ${COLORS.border}`,
        textDecoration: 'none', color: COLORS.text
      }}>
        <Link2 size={16} color={COLORS.textMid} />
        <div style={{ fontSize: '12px', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap', color: COLORS.textMid }}>
          {original}
        </div>
      </a>
      {isInstagram && (
        <div style={{
          display: 'flex', alignItems: 'center', justifyContent: 'space-between',
          gap: '8px', marginTop: '6px', paddingLeft: '4px'
        }}>
          <div style={{ fontSize: '10px', color: COLORS.textLight, flex: 1, lineHeight: 1.4 }}>
            ※タップするとブラウザで開きます。<br />Instagramアプリで開きたい時はURLをコピー →
          </div>
          <div onClick={handleCopy} style={{
            padding: '6px 12px',
            background: copied ? COLORS.mint || '#DDEBDC' : COLORS.surface,
            borderRadius: '10px', fontSize: '11px', fontWeight: 700,
            cursor: 'pointer', whiteSpace: 'nowrap',
            color: copied ? '#4A7C58' : COLORS.textMid,
            border: `1px solid ${COLORS.border}`
          }}>
            {copied ? '✓ コピーした' : '📋 URLコピー'}
          </div>
        </div>
      )}
    </div>
  );
}

// ========== Settings ==========
function SettingsView({ recipes, categories, onAddCategory, onUpdateCategory, onDeleteCategory, onClear, onShowChangelog }) {
  const totalCooked = recipes.reduce((sum, r) => sum + r.cookedLogs.length, 0);

  const exportData = () => {
    const blob = new Blob([JSON.stringify({ recipes, categories }, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `recipe-stock-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  const importData = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      try {
        const data = JSON.parse(ev.target.result);
        // 旧フォーマット（配列のみ）と新フォーマット（{recipes, categories}）に対応
        const rawRecipes = Array.isArray(data) ? data : (data && data.recipes);
        const rawCats = (!Array.isArray(data) && data) ? data.categories : null;
        if (!Array.isArray(rawRecipes)) {
          alert('ファイル形式が違うみたい。レシピ帳から書き出したJSONを選んでね');
          return;
        }
        const normalized = normalizeRecipes(rawRecipes);
        const normalizedCats = Array.isArray(rawCats) && rawCats.length > 0 ? normalizeCategories(rawCats) : null;
        if (confirm(`${normalized.length}件のレシピを読み込みます。今のデータは上書きされます。よろしいですか？`)) {
          localStorage.setItem(STORAGE_KEY, JSON.stringify(normalized));
          if (normalizedCats) localStorage.setItem(CATEGORIES_KEY, JSON.stringify(normalizedCats));
          location.reload();
        }
      } catch (err) {
        console.error(err);
        alert('ファイルが読み込めませんでした。JSONの中身が壊れていないか確認してね');
      }
    };
    reader.onerror = () => alert('ファイルが開けませんでした');
    reader.readAsText(file);
    // 同じファイルを再度選べるように input の値をクリア
    e.target.value = '';
  };

  return (
    <div style={{ padding: '20px 16px' }}>
      <div style={{ fontSize: '22px', fontWeight: 800, marginBottom: '20px' }}>設定</div>

      <div style={{
        background: COLORS.accentSoft, border: `1px solid ${COLORS.border}`,
        borderRadius: '14px', padding: '16px', marginBottom: '16px'
      }}>
        <div style={{ fontSize: '11px', fontWeight: 700, marginBottom: '10px', color: COLORS.textMid }}>STATS</div>
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '10px' }}>
          <div style={{ background: COLORS.card, borderRadius: '10px', padding: '12px' }}>
            <div style={{ fontSize: '11px', color: COLORS.textLight }}>保存レシピ</div>
            <div style={{ fontSize: '22px', fontWeight: 800, color: COLORS.text }}>{recipes.length}</div>
          </div>
          <div style={{ background: COLORS.card, borderRadius: '10px', padding: '12px' }}>
            <div style={{ fontSize: '11px', color: COLORS.textLight }}>作った回数</div>
            <div style={{ fontSize: '22px', fontWeight: 800, color: COLORS.text }}>{totalCooked}</div>
          </div>
        </div>
      </div>

      <CategoryManager
        categories={categories}
        onAdd={onAddCategory}
        onUpdate={onUpdateCategory}
        onDelete={onDeleteCategory}
      />

      <div style={{ fontSize: '11px', fontWeight: 700, color: COLORS.textMid, margin: '20px 0 8px', paddingLeft: '4px' }}>
        データのバックアップ
      </div>
      <div style={{ background: COLORS.card, borderRadius: '12px', marginBottom: '16px', border: `1px solid ${COLORS.border}`, overflow: 'hidden' }}>
        <div onClick={exportData} style={{
          padding: '14px 16px', cursor: 'pointer', fontSize: '13px', fontWeight: 600,
          borderBottom: `1px solid ${COLORS.border}`, color: COLORS.text
        }}>
          データをファイルに書き出す
        </div>
        <label style={{ display: 'block', padding: '14px 16px', cursor: 'pointer', fontSize: '13px', fontWeight: 600, color: COLORS.text }}>
          ファイルから読み込む
          <input type="file" accept="application/json,.json" onChange={importData} style={{ display: 'none' }} />
        </label>
      </div>

      <div onClick={onClear} style={{
        background: COLORS.card, borderRadius: '12px', padding: '14px',
        cursor: 'pointer', border: `1px solid ${COLORS.border}`,
        fontSize: '13px', color: COLORS.accentDeep, fontWeight: 600, textAlign: 'center'
      }}>すべてのレシピを削除</div>

      <div style={{ fontSize: '11px', fontWeight: 700, color: COLORS.textMid, margin: '20px 0 8px', paddingLeft: '4px' }}>
        アプリについて
      </div>
      <div style={{ background: COLORS.card, borderRadius: '12px', border: `1px solid ${COLORS.border}`, overflow: 'hidden' }}>
        <a href="https://github.com/mitsukenn/recipe-stock/blob/main/MANUAL.md" target="_blank" rel="noopener noreferrer" style={{
          display: 'block', padding: '14px 16px', fontSize: '13px', fontWeight: 600,
          borderBottom: `1px solid ${COLORS.border}`, color: COLORS.text, textDecoration: 'none'
        }}>
          📖 使い方マニュアルを開く
        </a>
        <div onClick={onShowChangelog} style={{
          padding: '14px 16px', cursor: 'pointer', fontSize: '13px', fontWeight: 600,
          color: COLORS.text, display: 'flex', justifyContent: 'space-between', alignItems: 'center'
        }}>
          <span>🎀 最新のアップデート内容を見る</span>
          <span style={{
            fontSize: '10px', fontWeight: 700, color: COLORS.accent,
            background: COLORS.accentSoft, padding: '2px 8px', borderRadius: '10px'
          }}>ver {APP_VERSION}</span>
        </div>
      </div>

      <div style={{ marginTop: '24px', textAlign: 'center', fontSize: '11px', color: COLORS.textLight }}>
        🍳 さきちゃんのレシピ帳 ver {APP_VERSION}
        <div style={{ marginTop: '4px' }}>データはこの端末のブラウザに保存されます</div>
      </div>
    </div>
  );
}

// ========== Category Manager ==========
function CategoryManager({ categories, onAdd, onUpdate, onDelete }) {
  const [editing, setEditing] = useState(null); // null=なし, 'new'=新規, name=既存編集
  const [name, setName] = useState('');
  const [emoji, setEmoji] = useState('🍽️');
  const [paletteIdx, setPaletteIdx] = useState(0);

  const startNew = () => {
    setEditing('new');
    setName('');
    setEmoji('🍽️');
    setPaletteIdx(0);
  };

  const startEdit = (c) => {
    setEditing(c.name);
    setName(c.name);
    setEmoji(c.emoji);
    const idx = CATEGORY_PALETTES.findIndex(p => p.color === c.color);
    setPaletteIdx(idx >= 0 ? idx : 0);
  };

  const handleSave = () => {
    const trimmed = name.trim();
    if (!trimmed) { alert('名前を入れてね'); return; }
    const palette = CATEGORY_PALETTES[paletteIdx];
    const cat = { name: trimmed, emoji, color: palette.color, deep: palette.deep };
    const ok = editing === 'new' ? onAdd(cat) : onUpdate(editing, cat);
    if (ok) setEditing(null);
  };

  return (
    <>
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', margin: '0 0 8px', paddingLeft: '4px' }}>
        <div style={{ fontSize: '11px', fontWeight: 700, color: COLORS.textMid }}>カテゴリー</div>
        {editing === null && (
          <div onClick={startNew} style={{
            display: 'flex', alignItems: 'center', gap: '4px',
            padding: '6px 12px', background: COLORS.accent, color: 'white',
            borderRadius: '14px', fontSize: '11px', fontWeight: 700, cursor: 'pointer'
          }}>
            <Plus size={12} color="white" /> 追加
          </div>
        )}
      </div>

      <div style={{ background: COLORS.card, borderRadius: '12px', border: `1px solid ${COLORS.border}`, overflow: 'hidden', marginBottom: '8px' }}>
        {categories.map((c, i) => (
          <div key={c.name} style={{
            display: 'flex', alignItems: 'center', gap: '10px',
            padding: '10px 14px',
            borderBottom: i < categories.length - 1 ? `1px solid ${COLORS.border}` : 'none'
          }}>
            <div style={{
              width: '36px', height: '36px', borderRadius: '10px', background: c.color,
              display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: '20px', flexShrink: 0
            }}>{c.emoji}</div>
            <div style={{ flex: 1, fontSize: '13px', fontWeight: 600 }}>{c.name}</div>
            <div onClick={() => startEdit(c)} style={{ padding: '6px', cursor: 'pointer' }}>
              <Edit3 size={14} color={COLORS.textMid} />
            </div>
            <div onClick={() => onDelete(c.name)} style={{ padding: '6px', cursor: 'pointer' }}>
              <Trash2 size={14} color={COLORS.accent} />
            </div>
          </div>
        ))}
      </div>

      {editing !== null && (
        <div style={{
          background: COLORS.card, borderRadius: '12px',
          border: `1.5px solid ${COLORS.accent}`, padding: '14px', marginBottom: '8px'
        }}>
          <div style={{ fontSize: '12px', fontWeight: 700, marginBottom: '10px', color: COLORS.accent }}>
            {editing === 'new' ? '新しいカテゴリー' : `「${editing}」を編集`}
          </div>

          <div style={{ fontSize: '11px', fontWeight: 700, color: COLORS.textMid, marginBottom: '4px' }}>名前</div>
          <input
            type="text" value={name} onChange={e => setName(e.target.value)}
            placeholder="例：レンジ・お弁当"
            style={{
              width: '100%', padding: '10px 12px', border: `1px solid ${COLORS.border}`,
              borderRadius: '10px', fontSize: '13px', background: COLORS.bg,
              outline: 'none', boxSizing: 'border-box', marginBottom: '12px'
            }}
          />

          <div style={{ fontSize: '11px', fontWeight: 700, color: COLORS.textMid, marginBottom: '6px' }}>絵文字</div>
          <div style={{ display: 'flex', alignItems: 'center', gap: '10px', marginBottom: '12px' }}>
            <div style={{
              width: '44px', height: '44px', borderRadius: '10px',
              background: CATEGORY_PALETTES[paletteIdx].color,
              display: 'flex', alignItems: 'center', justifyContent: 'center',
              fontSize: '24px', flexShrink: 0
            }}>{emoji || '?'}</div>
            <input
              type="text" value={emoji}
              onChange={e => setEmoji(e.target.value)}
              placeholder="絵文字を入力（例：🍳）"
              style={{
                flex: 1, padding: '10px 12px', border: `1px solid ${COLORS.border}`,
                borderRadius: '10px', fontSize: '14px', background: COLORS.bg,
                outline: 'none', boxSizing: 'border-box'
              }}
            />
          </div>
          <div style={{ fontSize: '10px', color: COLORS.textLight, marginTop: '-8px', marginBottom: '12px', lineHeight: 1.5 }}>
            スマホはキーボードの絵文字ボタン、PCは <kbd style={{ background: COLORS.surface, padding: '1px 6px', borderRadius: '4px', fontSize: '10px' }}>Win + .</kbd> または <kbd style={{ background: COLORS.surface, padding: '1px 6px', borderRadius: '4px', fontSize: '10px' }}>Ctrl + Cmd + Space</kbd> で絵文字パネルが開きます
          </div>

          <div style={{ fontSize: '11px', fontWeight: 700, color: COLORS.textMid, marginBottom: '6px' }}>色</div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: '6px', marginBottom: '14px' }}>
            {CATEGORY_PALETTES.map((p, i) => (
              <div key={p.label} onClick={() => setPaletteIdx(i)} style={{
                padding: '6px 10px', borderRadius: '14px',
                background: p.color, fontSize: '11px', fontWeight: 600, cursor: 'pointer',
                border: paletteIdx === i ? `1.5px solid ${p.deep}` : '1.5px solid transparent',
                color: COLORS.text
              }}>{p.label}</div>
            ))}
          </div>

          <div style={{ display: 'flex', gap: '8px' }}>
            <div onClick={() => setEditing(null)} style={{
              flex: 1, padding: '10px', textAlign: 'center', background: COLORS.surface,
              borderRadius: '10px', fontSize: '13px', fontWeight: 700, cursor: 'pointer'
            }}>キャンセル</div>
            <div onClick={handleSave} style={{
              flex: 1, padding: '10px', textAlign: 'center', background: COLORS.accent,
              color: 'white', borderRadius: '10px', fontSize: '13px', fontWeight: 700, cursor: 'pointer'
            }}>保存</div>
          </div>
        </div>
      )}
    </>
  );
}

    { id: 'list', label: '一覧', icon: Grid },
    { id: 'add', label: '追加', icon: Plus, primary: true },
    { id: 'settings', label: '設定', icon: Heart }
  ];

  return (
    <div style={{
      position: 'fixed', bottom: 0, left: 0, right: 0,
      maxWidth: '480px', margin: '0 auto',
      background: 'white', borderTop: `1px solid ${COLORS.border}`,
      padding: '8px 0 12px', display: 'flex', justifyContent: 'space-around',
      zIndex: 50
    }}>
      {items.map(item => {
        const Icon = item.icon;
        const active = view === item.id;
        if (item.primary) {
          return (
            <div key={item.id} onClick={() => setView(item.id)} style={{
              cursor: 'pointer', display: 'flex', flexDirection: 'column',
              alignItems: 'center', marginTop: '-16px'
            }}>
              <div style={{
                width: '48px', height: '48px', borderRadius: '50%',
                background: COLORS.accent,
                display: 'flex', alignItems: 'center', justifyContent: 'center',
                boxShadow: '0 4px 12px rgba(232, 134, 155, 0.35)'
              }}>
                <Icon size={22} color="white" strokeWidth={2.5} />
              </div>
              <div style={{ fontSize: '10px', fontWeight: 600, marginTop: '4px', color: COLORS.textLight }}>
                {item.label}
              </div>
            </div>
          );
        }
        return (
          <div key={item.id} onClick={() => setView(item.id)} style={{
            cursor: 'pointer', display: 'flex', flexDirection: 'column',
            alignItems: 'center', padding: '4px 12px'
          }}>
            <Icon size={22} color={active ? COLORS.text : COLORS.textLight} strokeWidth={active ? 2.5 : 2} />
            <div style={{
              fontSize: '10px', fontWeight: active ? 700 : 500,
              marginTop: '4px', color: active ? COLORS.text : COLORS.textLight
            }}>{item.label}</div>
          </div>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<RecipeStockApp />);
  </script>
</body>
</html>
